# This GitHub workflow will automatically build and test code changes
name: Local Tests
on:
  # Run when pushing code or config changes to GitHub
  push:
    paths:
      - '**.kt'
      - '**.yml'
      - build.gradle.kts
      - settings.gradle.kts
  # Run automatically for all pull requests
  pull_request:
  # Enable running workflow manually from GitHub Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out package
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
            distribution: corretto
            java-version: 21
      - name: Run gradle build
        run: gradle wrapper build
        shell: bash
      - name: Run local integ tests
        run: gradle wrapper localIntegTest -DrunLocalIntegTests=true
        shell: bash
